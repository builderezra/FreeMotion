<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FreeMotion — test runner</title>
<style>
  body { font: 13px/1.5 system-ui, sans-serif; background: #0d0f13; color: #e6e9ef; margin: 0; padding: 18px; }
  h1 { font-size: 15px; margin: 0 0 4px; }
  .sub { color: #8a93a6; font-size: 12px; margin-bottom: 14px; }
  #sum { font-size: 15px; font-weight: 700; margin: 10px 0 14px; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 12px; margin-right: 8px; }
  .green { background: #10331f; color: #57d98a; } .red { background: #3a1518; color: #ff7a85; }
  .row { padding: 7px 11px; border-radius: 7px; margin: 4px 0; display: flex; gap: 10px; align-items: baseline; }
  .row.ok { background: #11251a; } .row.fail { background: #2a1416; } .row.pend { opacity: .8; }
  .tag { font-weight: 700; flex: 0 0 46px; }
  .ok .tag { color: #57d98a; } .fail .tag { color: #ff7a85; }
  .err { color: #c98; font-size: 12px; }
  .item { color: #6a7488; }
  iframe { display: none; }
  .note { color: #6a7488; font-size: 11.5px; margin-top: 14px; }
</style>
</head>
<body>
  <h1>FreeMotion test suite</h1>
  <div class="sub">Headless render + DOM assertions against a synthetic scene. Loads the real app in a hidden frame, runs <code>tests.js</code>, reports green/red. "pending" = a known backlog gap not built yet.</div>
  <div id="sum">Loading app…</div>
  <div id="list"></div>
  <div class="note">Regression must be all-green to ship. Re-run after any change.</div>
  <iframe id="app" src="../index.html"></iframe>
  <script>
    var frame = document.getElementById('app');
    frame.addEventListener('load', function () {
      var w = frame.contentWindow;
      fetch('tests.js').then(function (r) { return r.text(); }).then(function (src) {
        var s = w.document.createElement('script'); s.textContent = src; w.document.body.appendChild(s);
        if (!w.FMTests) throw new Error('FMTests did not load (is FM initialised?)');
        return w.FMTests.run();
      }).then(function (res) {
        document.getElementById('sum').innerHTML =
          '<span class="pill ' + (res.regressionGreen ? 'green' : 'red') + '">Regression ' + res.regressionPass + '/' + res.regressionTotal + (res.regressionGreen ? ' ✓' : ' ✗') + '</span>' +
          '<span class="pill">Pending ' + res.pendingPass + '/' + res.pendingTotal + ' built</span>';
        document.getElementById('list').innerHTML = res.results.map(function (r) {
          var cls = r.ok ? 'ok' : (r.pending ? 'fail pend' : 'fail');
          return '<div class="row ' + cls + '">' +
            '<span class="tag">' + (r.ok ? 'PASS' : 'FAIL') + '</span>' +
            '<span>' + r.name + (r.pending ? ' <em style="opacity:.6">(pending)</em>' : '') +
            (r.error ? ' <span class="err">— ' + r.error + '</span>' : '') + '</span></div>';
        }).join('');
      }).catch(function (e) {
        document.getElementById('sum').innerHTML = '<span class="pill red">Error</span>' + (e && e.message || e);
      });
    });
  </script>
</body>
</html>
