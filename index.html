<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeMotion</title>
<link rel="stylesheet" href="styles.css?v=150">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#12151b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FreeMotion">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand">▶ FreeMotion <span class="ver" title="Tap to force-update to the very latest build">v2.54</span></div>
      <div class="top-actions">
        <!-- Undo/Redo moved to the centred transport row (AM keeps them by the play button, not the top bar). -->
        <!-- Generate + Import (and Text/Captions/etc.) live in the inspector's ADD menu (shown when nothing
             is selected), so they're off the bar here — kept hidden below so app.js keeps their handlers. -->
        <span class="spacer"></span>
        <input id="proj-name" class="proj-name" type="text" value="Untitled" title="Project name" spellcheck="false">
        <span class="spacer"></span>
        <!-- These live here (so app.js keeps their handlers wired) but are hidden from the bar — AM keeps
             the top minimal. They're reached from the ⋯ More menu (btn-more). -->
        <div id="topbar-extra" style="display:none">
          <button id="btn-ai" class="btn btn-ai" title="Generate a scene with AI"><span class="ai-spark">✨</span>Generate</button>
          <button id="btn-import" class="btn"><svg viewBox="0 0 24 24" class="ico" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>Import</button>
          <button id="btn-canvas" class="icon-btn" title="Canvas size / aspect ratio"><svg viewBox="0 0 24 24" class="ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3"/></svg></button>
          <button id="btn-guides" class="icon-btn" title="Safe margins & rule-of-thirds overlay"><svg viewBox="0 0 24 24" class="ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg></button>
          <button id="btn-snapshot" class="icon-btn" title="Save current frame as PNG"><svg viewBox="0 0 24 24" class="ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l1.5-2h7L17 8h3v11H4zM12 16a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg></button>
          <button id="btn-help" class="icon-btn" title="Keyboard shortcuts (?)"><svg viewBox="0 0 24 24" class="ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5a2.5 2.5 0 0 1 4.5 1.5c0 1.5-2 2-2 3.5M12 17.5h.01"/></svg></button>
          <button id="btn-open-proj" class="icon-btn" title="Open project file (.fmotion.json)"><svg viewBox="0 0 24 24" class="ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a1 1 0 0 1 1-1h5l2 2h8a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/><path d="M12 16v-5M9.5 13.5 12 11l2.5 2.5"/></svg></button>
          <button id="btn-save-proj" class="icon-btn" title="Save project file (.fmotion.json)"><svg viewBox="0 0 24 24" class="ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h11l3 3v15H5zM8 3v6h7V3M8 21v-7h8v7"/></svg></button>
        </div>
        <button id="btn-parent" class="icon-btn" title="Parent — link this layer to another layer" style="display:none"><svg viewBox="0 0 24 24" class="ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="11" height="11" rx="2" stroke-dasharray="3 2"/><rect x="10" y="10" width="11" height="11" rx="2"/></svg></button>
        <button id="btn-del-layer" class="icon-btn" title="Delete selected layer" style="display:none"><svg viewBox="0 0 24 24" class="ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13M10 11v6M14 11v6"/></svg></button>
        <button id="btn-more" class="icon-btn" title="More — canvas size, guides, save frame, open/save project, shortcuts"><svg viewBox="0 0 24 24" class="ico" fill="currentColor" stroke="none"><circle cx="5" cy="12" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="19" cy="12" r="1.8"/></svg></button>
        <button id="btn-export" class="btn btn-accent"><svg viewBox="0 0 24 24" class="ico" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9M7 14l5-5 5 5M5 3h14"/></svg>Export</button>
      </div>
    </header>

    <!-- Mobile-only AM-style top bar (phone): back · project name · settings · green export -->
    <header id="topbar-m">
      <button id="m-back" class="m-tbtn" aria-label="Projects / file"><svg viewBox="0 0 24 24" class="m-ico" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></button>
      <input id="proj-name-m" class="m-projname" type="text" value="Untitled" spellcheck="false" aria-label="Project name">
      <input id="clip-name-m" class="m-projname m-clipname" type="text" spellcheck="false" aria-label="Layer name">
      <span id="ver-m" class="m-ver" title="Build version"></span>
      <button id="m-settings" class="m-tbtn" aria-label="Canvas settings"><svg viewBox="0 0 24 24" class="m-ico" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button id="m-export" class="m-export" aria-label="Export"><svg viewBox="0 0 24 24" class="m-ico" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4M8 8l4-4 4 4M6 20h12"/></svg></button>
      <button id="m-group" class="m-tbtn" aria-label="Group selected layers"><svg viewBox="0 0 24 24" class="m-ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/><path d="M13 7h4a1 1 0 0 1 1 1v4M11 17H7a1 1 0 0 1-1-1v-4"/></svg></button>
      <button id="m-dup" class="m-tbtn" aria-label="Duplicate layer"><svg viewBox="0 0 24 24" class="m-ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 9h11v11H9zM5 15H4V4h11v1"/></svg></button>
      <button id="m-del" class="m-tbtn" aria-label="Delete layer"><svg viewBox="0 0 24 24" class="m-ico" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg></button>
    </header>

    <div id="main">
      <section id="stage">
        <div id="canvas-wrap">
          <canvas id="preview"></canvas>
          <div id="drop-hint">
            <div class="dh-icon">🎬</div>
            <div>Drag a video or image here<br>or click <b>Import media</b></div>
          </div>
        </div>
        <!-- AM-style right-side VIEW toolbar (toggled by the ⛶ button): fit · grid · layers · camera · canvas zoom -->
        <div id="view-bar" class="hidden" aria-label="View options">
          <button id="vb-fit" class="vb-btn" title="Fit canvas to screen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/></svg></button>
          <button id="vb-grid" class="vb-btn" title="Show grid / guides"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3zM3 9h18M3 15h18M9 3v18M15 3v18"/></svg></button>
          <button id="vb-layers" class="vb-btn" title="Layers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 3 8l9 5 9-5zM3.5 12.5 12 17l8.5-4.5M3.5 16.5 12 21l8.5-4.5"/></svg></button>
          <button id="vb-camera" class="vb-btn" title="Add camera"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1zM15 10l6-3v10l-6-3z"/></svg></button>
          <div id="vb-zoom">
            <button id="vb-zoomin" class="vb-z" title="Zoom in" aria-label="Zoom in">+</button>
            <span id="vb-zlabel">100%</span>
            <button id="vb-zoomout" class="vb-z" title="Zoom out" aria-label="Zoom out">−</button>
          </div>
        </div>
      </section>

      <aside id="inspector-panel" class="panel">
        <div class="panel-title">Inspector</div>
        <div id="inspector"><div class="empty">Select a layer to edit it.</div></div>
      </aside>
    </div>

    <footer id="timeline-panel">
      <!-- Alight Motion transport: PLAY dead-centre, 3 controls each side revolving around it.
           Left: undo · redo · jump-to-start.  Right: jump-to-end · layer-menu · fit. -->
      <div id="transport">
        <div class="t-side t-left">
          <button id="btn-undo" class="tbtn" title="Undo (Cmd+Z)"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 6 6v0"/></svg></button>
          <button id="btn-redo" class="tbtn" title="Redo (Cmd+Shift+Z)"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0-6 6v0"/></svg></button>
          <button id="btn-tostart" class="tbtn" title="Skip to previous benchmark / clip edge"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="5" x2="5" y2="19"/><polygon points="20 5 9 12 20 19 20 5"/></svg></button>
        </div>
        <button id="btn-play" class="tbtn tbtn-play" title="Play / Pause (space)"><svg viewBox="0 0 24 24" class="tco" fill="currentColor"><path d="M7 4.5v15l12-7.5z"/></svg></button>
        <div class="t-side t-right">
          <button id="btn-toend" class="tbtn" title="Skip to next benchmark / clip edge"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="4 5 15 12 4 19 4 5"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
          <button id="btn-layermenu" class="tbtn" title="Layer actions"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg></button>
          <button id="btn-amfit" class="tbtn" title="View options (grid · camera · zoom)"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/></svg></button>
        </div>
      </div>
      <!-- AM-style centred timecode pill, below the transport. -->
      <div id="tc-bar"><span id="time-readout">00:00:00</span></div>
      <!-- Non-AM controls kept OFF the row (per Ezra) but still in the DOM so app.js/timeline.js keep
           their handlers; reached from the ⋯ More menu. Hidden, never shown directly. -->
      <div id="transport-extra" style="display:none">
        <button id="btn-loop" class="tbtn" title="Loop playback"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 2 21 6 17 10"/><path d="M3 11a9 9 0 0 1 15-7"/><polyline points="7 22 3 18 7 14"/><path d="M21 13a9 9 0 0 1-15 7"/></svg></button>
        <button id="btn-split" class="tbtn" title="Split clip at playhead (S)"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.5" y2="15.5"/><line x1="8.5" y1="8.5" x2="20" y2="20"/></svg></button>
        <button id="btn-snap" class="tbtn active" title="Snapping (magnet)"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v7a6 6 0 0 0 12 0V4"/><line x1="4" y1="4" x2="8" y2="4"/><line x1="16" y1="4" x2="20" y2="4"/></svg></button>
        <button id="btn-onion" class="tbtn" title="Onion skin"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
        <select id="preview-rate" class="prate" title="Preview playback speed (preview only)">
          <option value="0.25">0.25×</option>
          <option value="0.5">0.5×</option>
          <option value="1" selected>1×</option>
          <option value="2">2×</option>
          <option value="4">4×</option>
        </select>
        <button id="btn-fit" class="tbtn" title="Trim project length to the last clip"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H5a1 1 0 0 0-1 1v4M15 4h4a1 1 0 0 1 1 1v4M9 20H5a1 1 0 0 1-1-1v-4M15 20h4a1 1 0 0 0 1-1v-4"/></svg></button>
        <button id="btn-zoomout" class="tbtn" title="Zoom timeline out"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <span id="tl-zoom-label" title="Timeline zoom">1×</span>
        <button id="btn-zoomin" class="tbtn" title="Zoom timeline in (⌘/Ctrl + scroll)"><svg viewBox="0 0 24 24" class="tco" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>
      <div id="timeline">
        <div id="tl-inner">
          <div id="tl-rulerrow"><div class="tl-headspace"></div><div id="tl-ruler"></div></div>
          <div id="tl-tracks"></div>
          <div id="tl-playhead"></div>
        </div>
      </div>
      <!-- Phone only: a fixed-centre playhead that lives OUTSIDE the scroller, so it can never move.
           The timeline content scrolls underneath it (AM behaviour). Positioned by timeline.js. -->
      <div id="tl-centerline" aria-hidden="true"></div>
    </footer>
  </div>

  <div id="toast" class="hidden"></div>
  <button id="insp-toggle" title="Inspector">✎</button>

  <!-- Mobile-only: AM-style green + FAB (add) + the Add bottom-sheet (contents built by mobile.js) -->
  <button id="add-fab" aria-label="Add"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
  <div id="add-sheet">
    <button id="add-grab" class="sheet-grab" type="button" aria-label="Close"><span class="grab-bar"></span></button>
    <div class="sheet-title">Add</div>
    <div id="add-grid" class="add-grid"></div>
  </div>

  <!-- Edit Group breadcrumb: shown while a group is open in its own timeline view -->
  <button id="group-crumb" class="hidden"><span class="gc-arrow">&#8249;</span><span class="gc-label">Editing group</span><span class="gc-name"></span></button>

  <input type="file" id="file-input" accept="video/*,image/*,audio/*" multiple hidden>

  <!-- Home screen (AM): all projects at a glance + Templates tab. Built by home.js. -->
  <div id="home-screen" class="hidden">
    <div class="hm-top">
      <div class="hm-brand">▶ FreeMotion</div>
      <button class="hm-more" aria-label="More">⋯</button>
    </div>
    <div class="hm-tabs">
      <button class="hm-tab active" data-tab="projects">Projects</button>
      <button class="hm-tab" data-tab="templates">Templates</button>
    </div>
    <div class="hm-scroll"><div class="hm-grid"></div></div>
    <button id="hm-new" aria-label="New project">+</button>
    <div id="hm-dialog" class="hidden">
      <div class="hm-dlg-card">
        <div class="hm-dlg-title">New project</div>
        <input id="hm-new-name" type="text" placeholder="Project name" spellcheck="false">
        <div class="hm-aspects">
          <button class="hm-aspect active" data-size="1080x1920">9:16<span>Phone</span></button>
          <button class="hm-aspect" data-size="1920x1080">16:9<span>Wide</span></button>
          <button class="hm-aspect" data-size="1080x1080">1:1<span>Square</span></button>
        </div>
        <div class="hm-dlg-actions">
          <button id="hm-cancel">Cancel</button>
          <button id="hm-create" class="accent">Create</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Full-screen Add-Effect browser (AM): featured carousel · paged recents/favourites · categories · search. Built by fx-browser.js. -->
  <div id="fx-browser" class="hidden">
    <div class="fxb-top">
      <button class="fxb-close" aria-label="Close">✕</button>
      <div class="fxb-title">Add Effect</div>
      <button class="fxb-search-btn" aria-label="Search effects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
    </div>
    <input class="fxb-search-input hidden" type="text" placeholder="Search effects…" spellcheck="false">
    <div class="fxb-scroll"></div>
  </div>

  <div id="export-overlay" class="hidden">
    <div class="export-card">
      <div class="export-title">Exporting</div>
      <div id="export-status">Preparing…</div>
      <div class="progress"><div id="export-bar"></div></div>
      <button id="export-cancel" class="btn">Cancel</button>
    </div>
  </div>

  <div id="export-dialog" class="hidden">
    <div class="export-card">
      <div class="export-title">Export video</div>
      <label class="field"><span>Resolution</span>
        <select id="exp-res">
          <option value="1">Full (project size)</option>
          <option value="0.5">Half</option>
          <option value="0.75">75%</option>
        </select>
      </label>
      <label class="field"><span>Frame rate</span>
        <select id="exp-fps">
          <option value="30">30 fps</option>
          <option value="24">24 fps</option>
          <option value="60">60 fps</option>
        </select>
      </label>
      <label class="field"><span>Quality</span>
        <select id="exp-quality">
          <option value="0.18">High</option>
          <option value="0.1" selected>Medium</option>
          <option value="0.05">Low</option>
        </select>
      </label>
      <label class="field"><span>Range</span>
        <select id="exp-range">
          <option value="whole">Whole project</option>
          <option value="loop">Loop region (if set)</option>
        </select>
      </label>
      <div class="dialog-actions">
        <button id="exp-cancel" class="btn">Cancel</button>
        <button id="exp-go" class="btn btn-accent">Export MP4</button>
      </div>
    </div>
  </div>

  <div id="canvas-dialog" class="hidden">
    <div class="export-card">
      <div class="export-title">Canvas size</div>
      <div class="aspect-row" id="aspect-row">
        <button class="aspect-chip" data-aspect="16:9"><span class="ac-frame ac-169"></span>16:9</button>
        <button class="aspect-chip" data-aspect="9:16"><span class="ac-frame ac-916"></span>9:16</button>
        <button class="aspect-chip" data-aspect="4:5"><span class="ac-frame ac-45"></span>4:5</button>
        <button class="aspect-chip" data-aspect="1:1"><span class="ac-frame ac-11"></span>1:1</button>
        <button class="aspect-chip" data-aspect="4:3"><span class="ac-frame ac-43"></span>4:3</button>
      </div>
      <label class="field"><span>Resolution</span>
        <select id="cv-res">
          <option value="720">720p</option>
          <option value="1080" selected>1080p (FHD)</option>
          <option value="1440">1440p (QHD)</option>

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        var hadController = !!navigator.serviceWorker.controller;   // was an app already installed?
        navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(function (reg) {
          if (reg && reg.update) { try { reg.update(); } catch (e) {} }   // check for a new build every launch
        }).catch(function () {});
        var reloaded = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          // A new service worker took over → reload ONCE so the installed PWA shows the latest build.
          // Skip the first-ever install's claim (hadController === false) so fresh installs don't reload.
          if (reloaded || !hadController) return;
          reloaded = true; window.location.reload();
        });
      });
    }
    // One-tap "force latest": TAP the version label to nuke the service worker + all caches and reload
    // fresh. The bulletproof escape hatch when an installed PWA is serving a stale build.
    window.addEventListener('load', function () {
      var vers = document.querySelectorAll('.ver, #ver-m');
      Array.prototype.forEach.call(vers, function (el) {
        el.style.cursor = 'pointer';
        el.title = 'Tap to force-update to the very latest build';
        el.addEventListener('click', function () {
          el.textContent = '…';
          // Navigate to a BRAND-NEW URL (cache-busted) rather than reload(): a reload can still be served by
          // a stuck old service worker, but a never-seen URL forces a real network fetch of every asset.
          var done = function () { var base = location.href.split('?')[0].split('#')[0]; location.replace(base + '?fresh=' + Date.now()); };
          (navigator.serviceWorker ? navigator.serviceWorker.getRegistrations().then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); }) : Promise.resolve())
            .then(function () { return window.caches ? caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); }) : null; })
            .then(done, done);
        });
      });
    });
